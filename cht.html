<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function ChatInput() {
            return (
                <div>
                    <input placeholder="send a message to chatbot" size="30" />
                    <button>Send</button>
                </div>
            );

        }
        function ChatMessage (props) {
            const { message, sender } = props;
            return (
                <div>
                {sender === 'robot' && <img src="robot.png" width="50" />}
                {message}
                {sender === 'user' && <img src="user.png" width="50" />}
                </div>
            );
        }
        function App() {
            return (
                <div>
                    <ChatInput />
                    <ChatMessage message="wassup chatbot!" sender="user" />
                    <ChatMessage message="yoo wassup user!" sender="robot" />
                    <ChatMessage message="how can I help you todat nigga?" sender="robot" />
                    <ChatMessage message="can you gat me today date?" sender="user" />
                    <ChatMessage message="yhhh nigga today is wed Apr 29!" sender="robot" />
                    <ChatMessage message="yooo thx bot!" sender="user" />
                    <ChatMessage message="yooo ma user and you!" sender="robot" />
                </div>
            );
        }
        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);

    </script>
  </body>
</html>
